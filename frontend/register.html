<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Register</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<h1>Cloud File Storage</h1>

<h2>Create Account</h2>

<form id="registerForm">

<input
type="text"
id="fullName"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="submit">

Register

</button>

</form>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<script type="module" src="js/auth.js"></script>

</body>

</html>
